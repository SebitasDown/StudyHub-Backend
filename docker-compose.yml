services:
  postgres:
    image: postgres:17-alpine
    container_name: study-hub-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: study_hub
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
